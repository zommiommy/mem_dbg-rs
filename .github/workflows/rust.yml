name: Rust

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-stable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Build
        run: cargo build
      - name: Run tests on all non-nightly features
        run: cargo test --features std,derive,half,maligned,mmap-rs,rand -- --skip _snapshot
      - name: Run no default features tests
        run: cargo test --no-default-features -- --skip _snapshot
      - name: Run tests with alloc and derive feature
        run: cargo test --no-default-features --features derive -- --skip _snapshot
      - name: Run examples
        working-directory: ./mem_dbg
        run: |
          set -e
          for example in examples/*.rs ; do cargo run --example "$(basename "${example%.rs}")" --release; done
      - name: Clippy (default)
        run: cargo clippy -- -D warnings
      - name: Clippy (no default features)
        run: cargo clippy --no-default-features -- -D warnings
      - name: Clippy (all stable features)
        run: cargo clippy --features std,derive,half,maligned,mmap-rs,rand -- -D warnings

  build-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install nightly toolchain
        run: rustup toolchain install nightly && rustup default nightly
      - name: Install Clippy
        run: rustup component add clippy
      - name: Build with all features
        run: cargo build --all-features
      - name: Run tests with all features (including offset_of_enum)
        run: cargo test --all-features -- --skip _snapshot
      - name: Check documentation
        run: cargo doc --all-features --document-private-items --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Clippy (all features)
        run: cargo clippy --all-features -- -D warnings

  coverage:
    needs: [build-stable, build-nightly]
    name: coverage
    runs-on: ubuntu-latest
    container:
      image: xd009642/tarpaulin:develop-nightly
      options: --security-opt seccomp=unconfined
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Generate code coverage
        run: |
          cargo +nightly tarpaulin --verbose --engine llvm --all-features  --run-types AllTargets --run-types Doctests --workspace --out Lcov --exclude mem_dbg-derive --exclude-files "mem_dbg/examples/*" --exclude-files "mem_dbg/tests/*insta*" -- --skip _snapshot --skip test_correctness
      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: "lcov.info"

  miri:
    needs: [build-stable, build-nightly]
    name: miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install nightly and miri
        run: rustup toolchain install nightly --component miri && rustup default nightly && cargo miri setup
      - name: Run tests with miri
        run: cargo miri test --all-features --all-targets -- --skip _snapshot

  build-i686:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install 32-bit support
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib
      - name: Add i686 target
        run: rustup target add i686-unknown-linux-gnu
      - name: Build (32-bit)
        run: cargo build --target i686-unknown-linux-gnu
      - name: Test (32-bit)
        run: cargo test --target i686-unknown-linux-gnu

  build-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: cargo build
      - name: Test (default features, includes snapshots)
        run: cargo test --features std,derive,half,maligned,mmap-rs,rand
      - name: Test (no default features)
        run: cargo test --no-default-features -- --skip _snapshot
      - name: Test (alloc + derive)
        run: cargo test --no-default-features --features derive -- --skip _snapshot
      - name: Clippy (all stable features)
        run: cargo clippy --features std,derive,half,maligned,mmap-rs,rand -- -D warnings
